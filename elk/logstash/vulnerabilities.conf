input {
  http_poller {
    urls => {
      circl_api => "https://vulnerability.circl.lu/api/last/50"
    }
    schedule => { "every" => "30m" }
    request_timeout => 60
    codec => "json"
    target => "circl"
  }
}

filter {
  # Metadata base para auditoría
  mutate {
    add_field => { "[@metadata][source]" => "circl_api" }
  }

  # 1) Si viene array: 1 evento por elemento
  if [circl] and [circl][0] {
    split { field => "[circl]" }
  } else {
    mutate {
      add_tag => ["audit_dropped"]
      add_field => { "audit_reason" => "unexpected_payload_shape" }
    }
  }

  # 2) Copiar hash [circl] al root para usar paths estándar
  ruby {
    code => "
      circl = event.get('circl')
      if circl.is_a?(Hash)
        circl.each { |k,v| event.set(k, v) }
      end
    "
  }

  # 3) Clasificación
  if [dataType] == "CVE_RECORD" {
    mutate { add_tag => ["audit_worked"] }
  } else {
    mutate {
      add_tag => ["audit_dropped"]
      add_field => {
        "audit_reason" => "non_cve_record"
        "record_id"    => "%{[id]}"
        "cve_id"       => "%{[cveMetadata][cveId]}"
      }
    }
  }

  # 4) Solo worked: extraer campos y CVSS
  if "audit_worked" in [tags] {

    mutate {
      add_field => {
        "cve_id"         => "%{[cveMetadata][cveId]}"
        "published_date" => "%{[cveMetadata][datePublished]}"
        "summary"        => "%{[containers][cna][descriptions][0][value]}"
        "state"          => "%{[cveMetadata][state]}"
        "date_updated"   => "%{[cveMetadata][dateUpdated]}"
        "assigner"       => "%{[cveMetadata][assignerShortName]}"
      }
    }

    if [containers][cna][metrics] {
      ruby {
        code => "
          metrics = event.get('[containers][cna][metrics]')
          metrics = [] unless metrics.is_a?(Array)

          cvss_score = nil
          cvss_version = nil
          cvss_severity = nil
          cvss_vector = nil

          metrics.each do |m|
            next unless m.is_a?(Hash)

            if m.key?('cvssV4_0')
              cvss = m['cvssV4_0']
              cvss_score    = cvss['baseScore']
              cvss_severity = cvss['baseSeverity']
              cvss_vector   = cvss['vectorString']
              cvss_version  = '4.0'
              break
            elsif m.key?('cvssV3_1')
              cvss = m['cvssV3_1']
              cvss_score    = cvss['baseScore']
              cvss_severity = cvss['baseSeverity']
              cvss_vector   = cvss['vectorString']
              cvss_version  = '3.1'
              break
            elsif m.key?('cvssV3_0')
              cvss = m['cvssV3_0']
              cvss_score    = cvss['baseScore']
              cvss_severity = cvss['baseSeverity']
              cvss_vector   = cvss['vectorString']
              cvss_version  = '3.0'
              break
            end
          end

          if !cvss_score.nil?
            event.set('[cvss][score]', cvss_score)
            event.set('[cvss][version]', cvss_version)
            event.set('[cvss][severity]', cvss_severity)
            event.set('[cvss][vector]', cvss_vector)
          end
        "
      }
    }

    mutate {
      convert => { "[cvss][score]" => "float" }
      remove_field => ["message", "@version", "event"]
    }

    date {
      match  => [ "published_date", "ISO8601" ]
      target => "@timestamp"
    }
  }
}

output {
  # ============ AUDITORÍA: DROPPED ============
  if "audit_dropped" in [tags] {
    file {
      path => "/var/log/logstash-audit/audit_dropped-%{+YYYY.MM.dd}.log"
      codec => json_lines
    }
  }

  # ============ AUDITORÍA: WORKED ============
  if "audit_worked" in [tags] {
    file {
      path => "/var/log/logstash-audit/audit_worked-%{+YYYY.MM.dd}.log"
      codec => json_lines
    }
  }

  # ============ OUTPUT PRINCIPAL ============
  if "audit_worked" in [tags] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "vulns-circl-%{+YYYY.MM}"
      document_id => "%{cve_id}"
      user => "user"
      password => "clave_robusta"
    }
  }
}

